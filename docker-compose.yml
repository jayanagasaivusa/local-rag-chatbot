
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      # This saves the AI models so they don't re-download every time
      - ollama_data:/root/.ollama
  
  ollama-pull:
    image: ollama/ollama
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: -c "sleep 10 && ollama pull nomic-embed-text && ollama pull gemma4:e4b"

volumes:
  ollama_data: